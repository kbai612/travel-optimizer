# iata:     primary international airport code (drives Travelpayouts lookups)
# icao:     ICAO airport code (drives OpenSky Network lookups)
# country:  ISO 3166-1 alpha-2 (drives Nager.Date public holiday lookups)
# lat/lon:  airport coordinates (drives Open-Meteo weather lookups)
#
# Chosen for a spread of hemispheres and climates so seasonal contrasts are visible
# in the final scores (e.g. Northern Hemisphere winter == Southern Hemisphere summer).

