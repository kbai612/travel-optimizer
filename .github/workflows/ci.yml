name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - run: uv run ruff check .

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      # Pure-logic unit tests (retry policy, date windows, advisory parsing,
      # config/idempotency guards) — no network, no secrets, runs in ~1s.
      - run: uv run pytest -q

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen

      # Keyless sources only (Open-Meteo weather/air-quality/marine, Nager.Date,
      # State Dept) so this job needs no secrets and is safe to run on PRs from
      # forks. OpenSky/Travelpayouts raw tables are still created (empty) by
      # warehouse/load.py, so the full model DAG still builds and tests.
      - name: Extract keyless sources
        run: >
          uv run python -m extract.run
          --source open_meteo nager air_quality marine state_dept
          --dest LIS SYD

      - name: Load warehouse
        run: uv run python -m warehouse.load

      - name: dbt build
        working-directory: dbt
        run: uv run --project .. dbt build --profiles-dir .
