version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: weather_daily
        description: Flattened daily weather observations from Open-Meteo (bronze -> silver via warehouse/load.py).
      - name: holidays
        description: Public holidays by destination country from Nager.Date.
      - name: flights_sampled
        description: >
          Sampled arrival/departure counts per destination from OpenSky Network
          (one representative 2-day window per calendar month, see extract/opensky.py).
      - name: price_monthly
        description: >
          Cheapest-fare-by-month per destination from the Travelpayouts Data API,
          accumulated across dated run snapshots (see extract/travelpayouts.py).
      - name: price_daily
        description: >
          Cheapest-fare-by-day per destination from the Travelpayouts calendar endpoint
          (next 6 months per run), accumulated across dated snapshots.
      - name: air_quality
        description: Hourly PM2.5 observations per destination from the Open-Meteo Air Quality API (CAMS).
      - name: sea_temperature
        description: >
          Hourly sea-surface temperature per destination from the Open-Meteo Marine API.
          Absent for destinations with no nearby sea grid cell.
      - name: travel_advisory
        description: US State Department travel advisory level (1-4) per destination country.
