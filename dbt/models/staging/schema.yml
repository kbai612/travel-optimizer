version: 2

models:
  - name: stg_weather
    description: Daily weather observations per destination, typed and cleaned.
    columns:
      - name: iata
        description: Destination airport code.
        tests:
          - not_null
      - name: observed_date
        tests:
          - not_null
      - name: temp_mean_c
        tests:
          - not_null

  - name: stg_holidays
    description: Public holidays per destination country.
    columns:
      - name: iata
        tests:
          - not_null
      - name: holiday_date
        tests:
          - not_null
      - name: country_code
        tests:
          - not_null

  - name: stg_flights
    description: Sampled arrival/departure counts per destination from OpenSky (one 2-day window per month).
    columns:
      - name: iata
        tests:
          - not_null
      - name: window_start
        tests:
          - not_null
      - name: total_movements
        tests:
          - not_null

  - name: stg_price_monthly
    description: >
      Cached cheapest-fare-by-month observations from Travelpayouts, with one row
      per destination/month inside each dated snapshot.
    columns:
      - name: iata
        tests:
          - not_null
      - name: origin
        description: Departure airport used to collect this Travelpayouts snapshot.
      - name: period
        tests:
          - not_null
      - name: collected_at
        description: Snapshot collection date; multiple runs accumulate as multiple rows.

  - name: stg_price_daily
    description: >
      Cached cheapest-fare-by-day observations from the Travelpayouts calendar
      endpoint, covering the current month plus the next five months per run.
    columns:
      - name: iata
        tests:
          - not_null
      - name: origin
        description: Departure airport used to collect this Travelpayouts snapshot.
      - name: depart_date
        tests:
          - not_null
      - name: collected_at
        description: Snapshot collection date; multiple runs accumulate as multiple rows.

  - name: stg_price_snapshot_manifest
    description: >
      One row per Travelpayouts snapshot file, including empty snapshots, so
      downstream models can pick the latest origin/run without guessing from fare rows.
    columns:
      - name: snapshot_source
        description: Which Travelpayouts bronze source produced the file.
        tests:
          - not_null
      - name: iata
        tests:
          - not_null
      - name: origin
        description: Departure airport recorded in the snapshot file.
      - name: collected_at
        description: Snapshot collection date encoded in the filename/payload.
        tests:
          - not_null

  - name: stg_air_quality
    description: Hourly PM2.5 observations per destination from Open-Meteo.
    columns:
      - name: iata
        tests:
          - not_null
      - name: observed_at
        tests:
          - not_null

  - name: stg_marine
    description: Hourly sea-surface temperature per destination from Open-Meteo.
    columns:
      - name: iata
        tests:
          - not_null
      - name: observed_at
        tests:
          - not_null

  - name: stg_travel_advisory
    description: US State Department travel advisory level per destination country.
    columns:
      - name: country_code
        tests:
          - not_null
      - name: level
        tests:
          - not_null
