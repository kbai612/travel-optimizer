name: "travel_optimizer"
version: "1.0.0"
config-version: 2

profile: "travel_optimizer"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Travel score weights (see models/marts/fct_travel_score.sql). Must sum to 1.0.
# Tune these and re-run `dbt build` to see how the recommendations shift.
vars:
  weight_weather: 0.35
  weight_demand: 0.25
  weight_price: 0.20
  weight_holiday: 0.20

models:
  travel_optimizer:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table
